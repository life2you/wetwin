name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  BINARY_NAME: wetwin
  ASSET_BASENAME: wetwin
  FORMULA_FILENAME: wetwin.rb
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  build-assets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package archive
        run: |
          asset_name="${ASSET_BASENAME}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "dist/${BINARY_NAME}"
          tar -C dist -czf "$asset_name" "$BINARY_NAME"
          mkdir -p release-assets
          mv "$asset_name" "release-assets/$asset_name"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release-assets/*

  publish-release:
    runs-on: ubuntu-latest
    needs: build-assets

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release-assets/*
          generate_release_notes: true

  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs: publish-release
    if: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN != '' }}

    steps:
      - name: Checkout tool repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: life2you/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
          path: homebrew-tap

      - name: Generate updated formula
        run: |
          version="${RELEASE_TAG#v}"
          ./scripts/update-homebrew-formula.sh "$version" --output "homebrew-tap/Formula/${FORMULA_FILENAME}"

      - name: Commit and push tap update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Formula/${FORMULA_FILENAME}"
          if git diff --cached --quiet; then
            echo "No tap update needed."
            exit 0
          fi
          git commit -m "Update ${ASSET_BASENAME} to ${RELEASE_TAG#v}"
          git push origin HEAD:main
